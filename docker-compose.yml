version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://vaultguard:vaultguard@postgres:5432/vaultguard
      - REDIS_URL=redis://redis:6379
      - ML_MODEL_PATH=models/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vaultguard
      POSTGRES_PASSWORD: vaultguard
      POSTGRES_DB: vaultguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
